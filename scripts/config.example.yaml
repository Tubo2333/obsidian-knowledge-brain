# Obsidian Knowledge Brain v2.0 — Configuration
# ===============================================
# Copy this file to config.yaml and fill in your paths.
# config.yaml is git-ignored and never committed.

version: "2.0"

# --- REQUIRED PATHS ---

# Path to your Obsidian vault (created by setup.py if it doesn't exist)
vault_path: ""

# Path to Claude projects directory where session JSONL files live
claude_project_path: ""

# Path to Python 3 interpreter
python_path: "python"

# --- OPTIONAL PATHS ---

# Path to CLAUDE.md for compiler step
claude_md_path: ""

# Nutstore/backup sync path (optional — for backup.py cloud sync)
backup_path: ""

# --- API CONFIGURATION (for LLM deep analysis in analyzer.py) ---

api:
  # Path to Claude settings.json (contains API key in env block)
  settings_json: ""

  # API key override (null = auto-read from settings.json env.ANTHROPIC_AUTH_TOKEN)
  key: null

  # API endpoint base URL (null = auto-detect from settings.json)
  base_url: null

  # Model name for deep analysis (null = auto-detect from settings.json)
  model: null

  temperature: 0.3
  max_tokens: 4000
  max_retries: 3
  retry_backoff_sec: [2, 4, 8]

# --- SCANNER SCHEDULE (informational — actual scheduling via Claude Code cron) ---

scan:
  day: SUN
  hour: 15
  minute: 0

# --- LOGGING ---

log_level: INFO
log_dir: ""    # auto-derived from vault_path/04-Feedback/_logs if empty
